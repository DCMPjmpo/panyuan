<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青狮龙虾 QingClaw - 微信登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #8B5CF6;
            --primary-dark: #7C3AED;
            --primary-light: #A78BFA;
            --accent-color: #F59E0B;
            --bg-dark: #1a1a2e;
            --bg-darker: #16162a;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --card-bg: #252542;
            --border-color: rgba(139, 92, 246, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16162a 50%, #0f0f1a 100%);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            padding: 1rem 2rem;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-light);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .nav-subtitle {
            color: var(--text-gray);
            font-size: 0.875rem;
            margin-left: 1rem;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-light), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: var(--text-gray);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .qrcode-container {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .qrcode-container img {
            width: 200px;
            height: 200px;
            display: block;
        }

        .qrcode-placeholder {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .qrcode-placeholder svg {
            width: 150px;
            height: 150px;
            color: #9ca3af;
        }

        .login-hint {
            color: var(--text-gray);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .brand-name {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Footer */
        footer {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-gray);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .login-card {
                padding: 2rem;
            }

            .qrcode-container img,
            .qrcode-placeholder {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <div class="logo-icon">🦞</div>
            青狮龙虾 QingClaw
        </a>
        <span class="nav-subtitle">律师 AI 助手</span>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="login-card">
            <h1 class="login-title">微信登录</h1>
            <p class="login-subtitle">扫码关注公众号，获取更多信息</p>
            
            <div class="qrcode-container">
                <div class="qrcode-placeholder">
                    <!-- 二维码占位符，实际使用时替换为真实二维码图片 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="3" height="3" />
                        <rect x="18" y="14" width="3" height="3" />
                        <rect x="14" y="18" width="3" height="3" />
                        <rect x="18" y="18" width="3" height="3" />
                    </svg>
                </div>
            </div>
            
            <p class="login-hint">使用微信扫一扫登录</p>
            <p class="login-hint">"<span class="brand-name">青狮龙虾</span>"</p>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>青狮龙虾 QingClaw · 律师 AI 助手</p>
    </footer>
</body>
</html>
